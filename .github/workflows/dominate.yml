name: Dominate
on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install requests
      - name: Generate
        run: python dominate.py
        env:
          GEMINI_API_KEY: ${{ secrets.AIzaSyC24AKJAYI9X92pRtMHDgMwZPp76U76n8U }}
          AMAZON_TAG: ${{ secrets.gadgethumans-21}}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN  }}
      - name: Commit
        run: |
          git config user.name "AI"
          git add .
          git diff --quiet || git commit -m "Auto"
          git push
